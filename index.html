<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizCash - কুইজ খেলুন, ব্যালেন্স জিতুন</title>
<style>
  :root{
    --green:#1db954;
    --green-dark:#0e8a3e;
    --yellow:#ffd60a;
    --black:#0d0f0d;
    --black2:#16181a;
    --gray:#9aa39a;
    --white:#f5f7f5;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI', Roboto, Arial, sans-serif;
    background:radial-gradient(circle at 20% 0%, #14301c 0%, var(--black) 45%);
    color:var(--white);
    min-height:100vh;
    overflow-x:hidden;
  }
  /* Animated background blobs */
  .blob{
    position:fixed; border-radius:50%; filter:blur(80px); opacity:.35; z-index:0;
    animation:float 12s ease-in-out infinite;
  }
  .blob1{width:300px;height:300px;background:var(--green);top:-100px;left:-80px;}
  .blob2{width:260px;height:260px;background:var(--yellow);bottom:-80px;right:-60px;animation-delay:3s;}
  @keyframes float{
    0%,100%{transform:translateY(0) translateX(0);}
    50%{transform:translateY(30px) translateX(20px);}
  }

  /* ===== Auth Screen ===== */
  #authScreen{
    position:relative;z-index:1;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:20px;
  }
  .authCard{
    width:100%;max-width:380px;
    background:rgba(22,24,26,.85);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:var(--radius);
    padding:32px 24px;
    box-shadow:0 20px 60px rgba(0,0,0,.5);
    animation:popIn .6s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes popIn{
    from{opacity:0;transform:translateY(30px) scale(.95);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  .logoRow{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;}
  .logoIcon{
    width:46px;height:46px;border-radius:12px;
    background:linear-gradient(135deg,var(--green),var(--yellow));
    display:flex;align-items:center;justify-content:center;
    font-size:24px;font-weight:800;color:var(--black);
    box-shadow:0 0 25px rgba(29,185,84,.5);
  }
  .logoText{font-size:24px;font-weight:800;letter-spacing:.5px;}
  .logoText span{color:var(--yellow);}
  .authSub{text-align:center;color:var(--gray);font-size:13px;margin-bottom:24px;}

  .tabSwitch{
    display:flex;background:var(--black);border-radius:10px;padding:4px;margin-bottom:22px;
  }
  .tabBtn{
    flex:1;padding:10px;border:none;background:transparent;color:var(--gray);
    font-weight:600;border-radius:8px;cursor:pointer;transition:.25s;font-size:14px;
  }
  .tabBtn.active{background:var(--green);color:var(--black);box-shadow:0 4px 15px rgba(29,185,84,.4);}

  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;color:var(--gray);margin-bottom:6px;font-weight:600;}
  .field input{
    width:100%;padding:13px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);
    background:#1e2120;color:var(--white);font-size:15px;outline:none;transition:.2s;
  }
  .field input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,185,84,.2);}

  .primaryBtn{
    width:100%;padding:14px;border:none;border-radius:10px;
    background:linear-gradient(135deg,var(--green),var(--green-dark));
    color:var(--white);font-weight:700;font-size:15px;cursor:pointer;
    box-shadow:0 8px 20px rgba(29,185,84,.35);
    transition:transform .15s, box-shadow .15s;
    margin-top:6px;
  }
  .primaryBtn:active{transform:scale(.97);}
  .primaryBtn:hover{box-shadow:0 10px 28px rgba(29,185,84,.5);}

  .authMsg{margin-top:12px;text-align:center;font-size:13px;min-height:18px;}
  .authMsg.error{color:#ff6b6b;}
  .authMsg.success{color:var(--yellow);}

  .bonusNote{
    margin-top:18px;text-align:center;font-size:12px;color:var(--yellow);
    background:rgba(255,214,10,.08);border:1px dashed rgba(255,214,10,.3);
    padding:8px;border-radius:8px;
  }

  /* ===== App Screen ===== */
  #appScreen{display:none;position:relative;z-index:1;min-height:100vh;padding-bottom:40px;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;
    background:rgba(13,15,13,.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,.06);
    position:sticky;top:0;z-index:10;
    gap:10px;
  }
  .brand{display:flex;align-items:center;gap:8px;}
  .brand .logoIcon{width:34px;height:34px;font-size:17px;border-radius:9px;}
  .brand .uname{display:flex;flex-direction:column;}
  .brand .uname b{font-size:14px;}
  .brand .uname small{font-size:10px;color:var(--gray);}

  .balanceBox{
    display:flex;align-items:center;gap:6px;
    background:linear-gradient(135deg,#1c2620,#10160f);
    border:1px solid rgba(255,214,10,.25);
    padding:7px 12px;border-radius:30px;font-weight:700;font-size:13px;
    color:var(--yellow);
    animation:glow 2.5s ease-in-out infinite;
  }
  @keyframes glow{
    0%,100%{box-shadow:0 0 0 rgba(255,214,10,0);}
    50%{box-shadow:0 0 14px rgba(255,214,10,.35);}
  }
  .cashoutBtn{
    padding:8px 14px;border:none;border-radius:30px;
    background:linear-gradient(135deg,var(--yellow),#ffb800);
    color:var(--black);font-weight:800;font-size:12px;cursor:pointer;
    box-shadow:0 6px 16px rgba(255,214,10,.35);
    transition:transform .15s;
    white-space:nowrap;
  }
  .cashoutBtn:active{transform:scale(.95);}

  .heroSection{padding:24px 18px 8px;text-align:center;}
  .heroSection h1{font-size:20px;font-weight:800;}
  .heroSection h1 span{color:var(--green);}
  .heroSection p{font-size:13px;color:var(--gray);margin-top:6px;}

  .quizGrid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
    padding:18px;
    max-width:520px;
    margin:0 auto;
  }
  @media(min-width:480px){
    .quizGrid{grid-template-columns:repeat(3,1fr);}
  }

  .quizCard{
    position:relative;
    background:linear-gradient(160deg,#171b18,#0f110f);
    border:1px solid rgba(255,255,255,.07);
    border-radius:14px;
    padding:18px 12px;
    text-align:center;
    cursor:pointer;
    overflow:hidden;
    transition:transform .2s, border-color .2s;
    animation:fadeUp .5s ease both;
  }
  .quizCard:hover{transform:translateY(-4px);border-color:var(--green);}
  .quizCard:active{transform:scale(.96);}
  .quizCard::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(circle at top right, rgba(29,185,84,.15), transparent 60%);
    opacity:0;transition:.3s;
  }
  .quizCard:hover::before{opacity:1;}

  .quizCard .qNum{
    font-size:26px;font-weight:800;
    background:linear-gradient(135deg,var(--green),var(--yellow));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .quizCard .qLabel{font-size:11px;color:var(--gray);margin-top:4px;font-weight:600;letter-spacing:.5px;}
  .quizCard .qReward{
    margin-top:10px;font-size:11px;font-weight:700;color:var(--yellow);
    display:inline-block;padding:3px 8px;border-radius:20px;
    background:rgba(255,214,10,.08);
  }
  .quizCard.done{opacity:.55;}
  .quizCard.done .qLabel::after{content:" ✓";color:var(--green);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  /* ===== Modal base ===== */
  .modalOverlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
    backdrop-filter:blur(4px);z-index:100;
    align-items:flex-end;justify-content:center;
  }
  @media(min-width:520px){.modalOverlay{align-items:center;}}
  .modalBox{
    background:var(--black2);
    width:100%;max-width:420px;
    border-radius:20px 20px 0 0;
    padding:24px 20px 28px;
    border:1px solid rgba(255,255,255,.08);
    animation:slideUp .35s ease;
    max-height:85vh;overflow-y:auto;
  }
  @media(min-width:520px){.modalBox{border-radius:18px;animation:popIn .35s ease;}}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  .modalHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .modalHead h2{font-size:17px;}
  .closeX{background:none;border:none;color:var(--gray);font-size:22px;cursor:pointer;line-height:1;}

  .progressBar{height:5px;background:#23261f;border-radius:10px;overflow:hidden;margin-bottom:18px;}
  .progressFill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow));width:0%;transition:width .35s;}

  .qText{font-size:16px;font-weight:700;margin-bottom:16px;line-height:1.4;}
  .optBtn{
    width:100%;text-align:left;padding:13px 14px;margin-bottom:10px;
    border-radius:10px;border:1px solid rgba(255,255,255,.1);
    background:#1c1f1c;color:var(--white);font-size:14px;cursor:pointer;
    transition:.2s;
  }
  .optBtn:hover{border-color:var(--green);}
  .optBtn.correct{background:rgba(29,185,84,.25);border-color:var(--green);}
  .optBtn.wrong{background:rgba(255,80,80,.2);border-color:#ff5050;}
  .optBtn:disabled{cursor:not-allowed;}

  .quizResult{text-align:center;padding:10px 0;}
  .quizResult .big{font-size:40px;margin-bottom:10px;}
  .quizResult h3{font-size:18px;margin-bottom:6px;}
  .quizResult p{color:var(--gray);font-size:13px;margin-bottom:18px;}
  .rewardTag{
    display:inline-block;background:linear-gradient(135deg,var(--yellow),#ffb800);
    color:var(--black);font-weight:800;padding:8px 18px;border-radius:30px;font-size:15px;
    box-shadow:0 8px 20px rgba(255,214,10,.4);
    animation:pop .4s ease;
  }
  @keyframes pop{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}

  /* Cashout modal */
  .levelBadge{
    text-align:center;background:rgba(255,214,10,.1);border:1px solid rgba(255,214,10,.3);
    color:var(--yellow);padding:12px;border-radius:12px;font-weight:700;font-size:15px;margin-bottom:18px;
  }
  .methodRow{display:flex;gap:10px;margin-bottom:16px;}
  .methodBtn{
    flex:1;padding:14px 8px;border-radius:12px;border:1px solid rgba(255,255,255,.1);
    background:#1c1f1c;color:var(--gray);font-weight:700;cursor:pointer;text-align:center;font-size:13px;
    transition:.2s;
  }
  .methodBtn.selected{border-color:var(--green);background:rgba(29,185,84,.15);color:var(--white);}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--green);color:var(--black);font-weight:700;font-size:13px;
    padding:12px 20px;border-radius:30px;box-shadow:0 10px 30px rgba(0,0,0,.4);
    z-index:200;opacity:0;pointer-events:none;transition:.3s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  footer{text-align:center;color:#5b635c;font-size:11px;margin-top:30px;}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- ===== AUTH SCREEN ===== -->
<div id="authScreen">
  <div class="authCard">
    <div class="logoRow">
      <div class="logoIcon">Q</div>
      <div class="logoText">Quiz<span>Cash</span></div>
    </div>
    <p class="authSub">কুইজ খেলুন, ব্যালেন্স জিতুন</p>

    <div class="tabSwitch">
      <button class="tabBtn active" id="loginTab" onclick="switchTab('login')">লগইন</button>
      <button class="tabBtn" id="signupTab" onclick="switchTab('signup')">সাইনআপ</button>
    </div>

    <div class="field">
      <label>মোবাইল নম্বর</label>
      <input type="tel" id="phoneInput" placeholder="01XXXXXXXXX" maxlength="11">
    </div>
    <div class="field" id="nameField" style="display:none;">
      <label>নাম</label>
      <input type="text" id="nameInput" placeholder="আপনার নাম">
    </div>
    <div class="field">
      <label>পাসওয়ার্ড</label>
      <input type="password" id="passInput" placeholder="পাসওয়ার্ড">
    </div>

    <button class="primaryBtn" id="authSubmitBtn" onclick="handleAuth()">লগইন করুন</button>
    <div class="authMsg" id="authMsg"></div>

    <div class="bonusNote" id="bonusNote">🎁 সাইনআপ করলেই পাবেন ১০০ টাকা বোনাস!</div>
  </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div id="appScreen">
  <div class="topbar">
    <div class="brand">
      <div class="logoIcon">Q</div>
      <div class="uname">
        <b id="appUserName">User</b>
        <small>QuizCash মেম্বার</small>
      </div>
    </div>
    <div class="balanceBox">💰 <span id="balanceDisplay">0</span> ৳</div>
    <button class="cashoutBtn" onclick="openCashout()">ক্যাশআউট</button>
  </div>

  <div class="heroSection">
    <h1>আজকের <span>কুইজ চ্যালেঞ্জ</span></h1>
    <p>প্রতিটি কুইজে ৩টি প্রশ্নের উত্তর দিন এবং জিতুন ১৫০ ৳</p>
  </div>

  <div class="quizGrid" id="quizGrid"></div>

  <footer>© 2026 QuizCash · মজা করে শিখুন, জিতুন</footer>
</div>

<!-- Quiz Modal -->
<div class="modalOverlay" id="quizModal">
  <div class="modalBox">
    <div class="modalHead">
      <h2 id="quizModalTitle">কুইজ ১</h2>
      <button class="closeX" onclick="closeModal('quizModal')">✕</button>
    </div>
    <div class="progressBar"><div class="progressFill" id="progressFill"></div></div>
    <div id="quizBody"></div>
  </div>
</div>

<!-- Cashout Modal -->
<div class="modalOverlay" id="cashoutModal">
  <div class="modalBox">
    <div class="modalHead">
      <h2>ক্যাশআউট</h2>
      <button class="closeX" onclick="closeModal('cashoutModal')">✕</button>
    </div>
    <div class="levelBadge">⚠️ লেভেল ২ এ আপগ্রেড করুন</div>
    <div class="field">
      <label>আপনার নম্বর (বিকাশ / নগদ)</label>
      <input type="tel" id="cashoutNumber" placeholder="01XXXXXXXXX" maxlength="11">
    </div>
    <div class="field">
      <label>মেথড সিলেক্ট করুন</label>
      <div class="methodRow">
        <button class="methodBtn" id="bkashBtn" onclick="selectMethod('bkash')">বিকাশ</button>
        <button class="methodBtn" id="nagadBtn" onclick="selectMethod('nagad')">নগদ</button>
      </div>
    </div>
    <button class="primaryBtn" onclick="submitCashout()">আপগ্রেড রিকোয়েস্ট পাঠান</button>
    <div class="authMsg" id="cashoutMsg"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- In-memory "database" ---------- */
const users = {}; // phone -> {name, password, balance, completed:[bool x10]}
let currentUser = null;
let authMode = 'login';

/* ---------- Question bank (pool, 3 random picked per quiz) ---------- */
const questionPool = [
  {q:"বাংলাদেশের রাজধানী কোনটি?", opts:["কুমিল্লা","ঢাকা","চট্টগ্রাম","নোয়াখালী"], a:1},
  {q:"বাংলাদেশের জাতীয় ফুল কোনটি?", opts:["গোলাপ","শাপলা","সূর্যমুখী","জবা"], a:1},
  {q:"বাংলাদেশের জাতীয় ভাষা কী?", opts:["ইংরেজি","হিন্দি","বাংলা","উর্দু"], a:2},
  {q:"বিশ্বের সবচেয়ে বড় মহাসাগর কোনটি?", opts:["আটলান্টিক","ভারত মহাসাগর","প্রশান্ত মহাসাগর","সুমেরু মহাসাগর"], a:2},
  {q:"১ ডজন সমান কত?", opts:["১০","১২","১৫","২০"], a:1},
  {q:"সূর্য কোন দিকে ওঠে?", opts:["পশ্চিম","দক্ষিণ","পূর্ব","উত্তর"], a:2},
  {q:"মানুষের শরীরে কয়টি হাড় আছে?", opts:["১০৬","২০৬","৩০৬","৪০৬"], a:1},
  {q:"বাংলাদেশের জাতীয় পাখি কোনটি?", opts:["কাক","দোয়েল","ময়না","টিয়া"], a:1},
  {q:"পানির রাসায়নিক সংকেত কী?", opts:["CO2","H2O","O2","NaCl"], a:1},
  {q:"বিশ্বের সবচেয়ে বড় মরুভূমি কোনটি?", opts:["সাহারা","গোবি","থর","কালাহারি"], a:0},
  {q:"১ কিলোমিটার সমান কত মিটার?", opts:["১০","১০০","১০০০","১০০০০"], a:2},
  {q:"বাংলাদেশের জাতীয় মাছ কোনটি?", opts:["রুই","ইলিশ","কাতলা","পাঙ্গাস"], a:1},
  {q:"পৃথিবীর সবচেয়ে উঁচু পর্বত কোনটি?", opts:["কে-টু","এভারেস্ট","কিলিমাঞ্জারো","আল্পস"], a:1},
  {q:"একটি সপ্তাহে কয়দিন থাকে?", opts:["৫","৬","৭","৮"], a:2},
  {q:"বাংলাদেশ স্বাধীন হয় কত সালে?", opts:["১৯৬৯","১৯৭১","১৯৭৫","১৯৮০"], a:1},
  {q:"মানুষের হৃদপিণ্ড শরীরের কোন দিকে থাকে?", opts:["ডানে","বামে","মাঝে","উপরে"], a:1},
  {q:"বাংলাদেশের দীর্ঘতম নদী কোনটি?", opts:["পদ্মা","মেঘনা","যমুনা","ব্রহ্মপুত্র"], a:2},
  {q:"১ বছরে কয়টি মাস থাকে?", opts:["১০","১১","১২","১৩"], a:2},
  {q:"পৃথিবী সূর্যকে একবার প্রদক্ষিণ করতে কত সময় নেয়?", opts:["১ দিন","১ মাস","১ বছর","১০ বছর"], a:2},
  {q:"বাংলাদেশের মুদ্রার নাম কী?", opts:["রুপি","টাকা","ডলার","দিনার"], a:1}
];

const totalQuizzes = 10;
let activeQuizIndex = null;
let activeQuestions = [];
let currentQIdx = 0;
let score = 0;
let cashoutMethod = null;

/* ---------- Auth ---------- */
function switchTab(mode){
  authMode = mode;
  document.getElementById('loginTab').classList.toggle('active', mode==='login');
  document.getElementById('signupTab').classList.toggle('active', mode==='signup');
  document.getElementById('nameField').style.display = mode==='signup' ? 'block' : 'none';
  document.getElementById('authSubmitBtn').textContent = mode==='signup' ? 'সাইনআপ করুন' : 'লগইন করুন';
  document.getElementById('bonusNote').style.display = mode==='signup' ? 'block' : 'none';
  document.getElementById('authMsg').textContent = '';
}

function showAuthMsg(text, type){
  const el = document.getElementById('authMsg');
  el.textContent = text;
  el.className = 'authMsg ' + type;
}

function handleAuth(){
  const phone = document.getElementById('phoneInput').value.trim();
  const pass = document.getElementById('passInput').value.trim();

  if(!/^01[0-9]{9}$/.test(phone)){
    showAuthMsg('সঠিক ১১ ডিজিটের মোবাইল নম্বর দিন', 'error');
    return;
  }
  if(pass.length < 4){
    showAuthMsg('পাসওয়ার্ড কমপক্ষে ৪ অক্ষরের হতে হবে', 'error');
    return;
  }

  if(authMode === 'signup'){
    const name = document.getElementById('nameInput').value.trim();
    if(!name){ showAuthMsg('নাম লিখুন', 'error'); return; }
    if(users[phone]){ showAuthMsg('এই নম্বরে একটি অ্যাকাউন্ট আছে, লগইন করুন', 'error'); return; }
    users[phone] = {
      name: name,
      password: pass,
      balance: 100,
      completed: new Array(totalQuizzes).fill(false)
    };
    showAuthMsg('অ্যাকাউন্ট তৈরি হয়েছে! ১০০ ৳ বোনাস যোগ হয়েছে 🎉', 'success');
    setTimeout(()=>loginUser(phone), 600);
  } else {
    const u = users[phone];
    if(!u || u.password !== pass){
      showAuthMsg('নম্বর বা পাসওয়ার্ড ভুল হয়েছে', 'error');
      return;
    }
    loginUser(phone);
  }
}

function loginUser(phone){
  currentUser = phone;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  renderApp();
}

/* ---------- App rendering ---------- */
function renderApp(){
  const u = users[currentUser];
  document.getElementById('appUserName').textContent = u.name;
  document.getElementById('balanceDisplay').textContent = u.balance;

  const grid = document.getElementById('quizGrid');
  grid.innerHTML = '';
  for(let i=0;i<totalQuizzes;i++){
    const done = u.completed[i];
    const card = document.createElement('div');
    card.className = 'quizCard' + (done ? ' done' : '');
    card.style.animationDelay = (i*0.05)+'s';
    card.onclick = ()=>openQuiz(i);
    card.innerHTML = `
      <div class="qNum">${i+1}</div>
      <div class="qLabel">কুইজ ${i+1}</div>
      <div class="qReward">${done ? 'সম্পন্ন' : '+১৫০ ৳'}</div>
    `;
    grid.appendChild(card);
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ---------- Quiz logic ---------- */
function getRandomQuestions(){
  const pool = [...questionPool];
  const picked = [];
  for(let i=0;i<3;i++){
    const idx = Math.floor(Math.random()*pool.length);
    picked.push(pool[idx]);
    pool.splice(idx,1);
  }
  return picked;
}

function openQuiz(index){
  activeQuizIndex = index;
  activeQuestions = getRandomQuestions();
  currentQIdx = 0;
  score = 0;
  document.getElementById('quizModalTitle').textContent = 'কুইজ ' + (index+1);
  document.getElementById('quizModal').style.display = 'flex';
  renderQuestion();
}

function renderQuestion(){
  const total = activeQuestions.length;
  document.getElementById('progressFill').style.width = ((currentQIdx)/total*100)+'%';

  if(currentQIdx >= total){
    finishQuiz();
    return;
  }
  const q = activeQuestions[currentQIdx];
  const body = document.getElementById('quizBody');
  body.innerHTML = `
    <div class="qText">প্রশ্ন ${currentQIdx+1}/${total}: ${q.q}</div>
    <div id="optsWrap"></div>
  `;
  const wrap = document.getElementById('optsWrap');
  q.opts.forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.className = 'optBtn';
    btn.textContent = `${i+1}. ${opt}`;
    btn.onclick = ()=>answerQuestion(i, q.a, btn);
    wrap.appendChild(btn);
  });
}

function answerQuestion(selected, correctIdx, btnEl){
  const allBtns = document.querySelectorAll('#optsWrap .optBtn');
  allBtns.forEach((b,i)=>{
    b.disabled = true;
    if(i === correctIdx) b.classList.add('correct');
    else if(i === selected) b.classList.add('wrong');
  });
  if(selected === correctIdx) score++;

  setTimeout(()=>{
    currentQIdx++;
    renderQuestion();
  }, 800);
}

function finishQuiz(){
  document.getElementById('progressFill').style.width = '100%';
  const u = users[currentUser];
  const alreadyDone = u.completed[activeQuizIndex];
  let earned = 0;
  if(!alreadyDone){
    earned = 150;
    u.balance += 150;
    u.completed[activeQuizIndex] = true;
  }

  const body = document.getElementById('quizBody');
  body.innerHTML = `
    <div class="quizResult">
      <div class="big">${score === activeQuestions.length ? '🏆' : '✅'}</div>
      <h3>কুইজ সম্পন্ন!</h3>
      <p>আপনি ${activeQuestions.length}টির মধ্যে ${score}টি সঠিক উত্তর দিয়েছেন</p>
      ${earned > 0
        ? `<div class="rewardTag">+ ${earned} ৳ পেয়েছেন!</div>`
        : `<div class="rewardTag" style="background:#3a3d39;color:#aaa;box-shadow:none;">ইতিমধ্যে সম্পন্ন</div>`}
      <br><br>
      <button class="primaryBtn" onclick="closeModal('quizModal'); renderApp();">ঠিক আছে</button>
    </div>
  `;
  renderApp();
  if(earned>0) showToast('🎉 ব্যালেন্সে ১৫০ ৳ যোগ হয়েছে!');
}

/* ---------- Cashout ---------- */
function openCashout(){
  cashoutMethod = null;
  document.getElementById('bkashBtn').classList.remove('selected');
  document.getElementById('nagadBtn').classList.remove('selected');
  document.getElementById('cashoutNumber').value = '';
  document.getElementById('cashoutMsg').textContent = '';
  document.getElementById('cashoutModal').style.display = 'flex';
}

function selectMethod(method){
  cashoutMethod = method;
  document.getElementById('bkashBtn').classList.toggle('selected', method==='bkash');
  document.getElementById('nagadBtn').classList.toggle('selected', method==='nagad');
}

function submitCashout(){
  const num = document.getElementById('cashoutNumber').value.trim();
  const msg = document.getElementById('cashoutMsg');
  if(!/^01[0-9]{9}$/.test(num)){
    msg.className = 'authMsg error';
    msg.textContent = 'সঠিক নম্বর দিন';
    return;
  }
  if(!cashoutMethod){
    msg.className = 'authMsg error';
    msg.textContent = 'একটি মেথড সিলেক্ট করুন';
    return;
  }
  msg.className = 'authMsg success';
  msg.textContent = 'রিকোয়েস্ট গ্রহণ করা হয়েছে। লেভেল ২ আপগ্রেড করতে সাপোর্টে যোগাযোগ করুন।';
}

/* ---------- Modal helpers ---------- */
function closeModal(id){
  document.getElementById(id).style.display = 'none';
}
document.querySelectorAll('.modalOverlay').forEach(ov=>{
  ov.addEventListener('click', e=>{
    if(e.target === ov) ov.style.display = 'none';
  });
});
</script>
